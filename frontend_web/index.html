<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NUST Kitchen</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e0d;
    --bg2: #1a1916;
    --bg3: #252320;
    --bg4: #2e2c28;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0ece4;
    --text2: #a09a8e;
    --text3: #6b6560;
    --accent: #e8b84b;
    --accent2: #c9922a;
    --accent-bg: rgba(232,184,75,0.12);
    --green: #5cb87a;
    --green-bg: rgba(92,184,122,0.12);
    --red: #e06c6c;
    --red-bg: rgba(224,108,108,0.12);
    --blue: #6ca8e0;
    --blue-bg: rgba(108,168,224,0.12);
    --purple: #a889e0;
    --purple-bg: rgba(168,137,224,0.12);
    --radius: 10px;
    --radius-lg: 16px;
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
    overflow-x: hidden;
  }

  /* LOGIN */
  #login-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
    background: var(--bg);
  }
  .login-card {
    width: 100%;
    max-width: 420px;
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: var(--radius-lg);
    padding: 2.5rem;
  }
  .login-logo {
    font-family: 'DM Serif Display', serif;
    font-size: 28px;
    color: var(--accent);
    margin-bottom: 4px;
    letter-spacing: -0.5px;
  }
  .login-sub { color: var(--text3); font-size: 13px; margin-bottom: 2rem; }
  .form-group { margin-bottom: 1rem; }
  .form-group label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 6px; font-weight: 500; letter-spacing: 0.5px; text-transform: uppercase; }
  .form-group input, .form-group select, .form-group textarea {
    width: 100%; padding: 10px 14px;
    background: var(--bg3); border: 1px solid var(--border2);
    border-radius: var(--radius); color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 14px;
    outline: none; transition: border-color 0.2s;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--accent); }
  .form-group select option { background: var(--bg3); }
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 10px 18px; border-radius: var(--radius);
    font-family: 'DM Sans', sans-serif; font-size: 14px;
    font-weight: 500; cursor: pointer; border: none; transition: all 0.2s;
    text-decoration: none;
  }
  .btn-primary { background: var(--accent); color: #1a1400; }
  .btn-primary:hover { background: #f5c85a; }
  .btn-primary:disabled { background: var(--bg4); color: var(--text3); cursor: not-allowed; }
  .btn-secondary { background: var(--bg3); color: var(--text); border: 1px solid var(--border2); }
  .btn-secondary:hover { background: var(--bg4); }
  .btn-danger { background: var(--red-bg); color: var(--red); border: 1px solid rgba(224,108,108,0.2); }
  .btn-danger:hover { background: rgba(224,108,108,0.2); }
  .btn-success { background: var(--green-bg); color: var(--green); border: 1px solid rgba(92,184,122,0.2); }
  .btn-success:hover { background: rgba(92,184,122,0.2); }
  .btn-sm { padding: 6px 12px; font-size: 12px; }
  .btn-full { width: 100%; justify-content: center; }

  /* APP LAYOUT */
  #app-screen { display: none; height: 100vh; flex-direction: row; }
  #app-screen.visible { display: flex; }

  /* SIDEBAR */
  .sidebar {
    width: 240px; min-width: 240px;
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow-y: auto;
    z-index: 10;
  }
  .sidebar-header {
    padding: 1.5rem 1.25rem 1rem;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-logo {
    font-family: 'DM Serif Display', serif;
    font-size: 20px; color: var(--accent);
    letter-spacing: -0.3px;
  }
  .sidebar-role {
    display: inline-block; font-size: 10px; font-weight: 600;
    letter-spacing: 0.8px; text-transform: uppercase;
    padding: 2px 8px; border-radius: 20px; margin-top: 4px;
  }
  .role-admin { background: var(--accent-bg); color: var(--accent); }
  .role-staff { background: var(--blue-bg); color: var(--blue); }
  .role-student { background: var(--green-bg); color: var(--green); }

  .sidebar-nav { flex: 1; padding: 0.75rem 0; }
  .nav-section { padding: 0.5rem 1.25rem 0.25rem; font-size: 10px; font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase; color: var(--text3); }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 1.25rem; cursor: pointer;
    color: var(--text2); font-size: 13.5px; font-weight: 400;
    transition: all 0.15s; border-left: 2px solid transparent;
    user-select: none;
  }
  .nav-item:hover { color: var(--text); background: var(--bg3); }
  .nav-item.active { color: var(--accent); background: var(--accent-bg); border-left-color: var(--accent); font-weight: 500; }
  .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }

  .sidebar-footer { padding: 1rem 1.25rem; border-top: 1px solid var(--border); }
  .sidebar-user { font-size: 12px; color: var(--text2); }
  .sidebar-user strong { display: block; color: var(--text); font-size: 13px; margin-bottom: 2px; }

  /* MAIN */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .topbar {
    padding: 1rem 1.5rem; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    background: var(--bg2); flex-shrink: 0;
  }
  .topbar h1 { font-size: 18px; font-weight: 500; }
  .topbar-actions { display: flex; gap: 8px; align-items: center; }

  .content { flex: 1; overflow-y: auto; padding: 1.5rem; }

  /* PANELS */
  .panel { display: none; }
  .panel.active { display: block; }

  /* CARDS */
  .card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 1rem;
  }
  .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
  .card-title { font-size: 15px; font-weight: 500; }
  .card-subtitle { font-size: 12px; color: var(--text2); margin-top: 2px; }

  /* STAT GRID */
  .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 1.5rem; }
  .stat-card {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 1rem;
  }
  .stat-label { font-size: 11px; font-weight: 500; letter-spacing: 0.5px; text-transform: uppercase; color: var(--text3); margin-bottom: 6px; }
  .stat-value { font-size: 26px; font-weight: 300; color: var(--text); font-family: 'DM Serif Display', serif; }
  .stat-value.accent { color: var(--accent); }
  .stat-value.green { color: var(--green); }
  .stat-value.red { color: var(--red); }
  .stat-value.blue { color: var(--blue); }

  /* TABLE */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 10px 12px; font-size: 11px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; color: var(--text3); border-bottom: 1px solid var(--border); white-space: nowrap; }
  td { padding: 10px 12px; border-bottom: 1px solid var(--border); color: var(--text2); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--bg3); color: var(--text); }

  /* BADGES */
  .badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 500; }
  .badge-green { background: var(--green-bg); color: var(--green); }
  .badge-red { background: var(--red-bg); color: var(--red); }
  .badge-amber { background: var(--accent-bg); color: var(--accent); }
  .badge-blue { background: var(--blue-bg); color: var(--blue); }
  .badge-purple { background: var(--purple-bg); color: var(--purple); }

  /* GRID */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; }
  @media(max-width: 768px) { .grid-2, .grid-3 { grid-template-columns: 1fr; } }

  /* MODAL */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.7); z-index: 1000;
    align-items: center; justify-content: center; padding: 1rem;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--bg2); border: 1px solid var(--border2);
    border-radius: var(--radius-lg); padding: 1.75rem;
    width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto;
  }
  .modal-title { font-size: 17px; font-weight: 500; margin-bottom: 1.25rem; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1.25rem; padding-top: 1rem; border-top: 1px solid var(--border); }

  /* TOAST */
  #toast-container { position: fixed; top: 1rem; right: 1rem; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
  .toast {
    padding: 12px 16px; border-radius: var(--radius); font-size: 13px; font-weight: 500;
    border: 1px solid; max-width: 320px;
    animation: slideIn 0.25s ease;
  }
  .toast-success { background: var(--green-bg); color: var(--green); border-color: rgba(92,184,122,0.25); }
  .toast-error { background: var(--red-bg); color: var(--red); border-color: rgba(224,108,108,0.25); }
  .toast-info { background: var(--blue-bg); color: var(--blue); border-color: rgba(108,168,224,0.25); }
  @keyframes slideIn { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

  /* LOADING */
  .loading { display: flex; align-items: center; gap: 8px; color: var(--text3); font-size: 13px; padding: 2rem; }
  .spinner { width: 16px; height: 16px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* EMPTY */
  .empty { text-align: center; padding: 3rem 1rem; color: var(--text3); }
  .empty svg { opacity: 0.3; margin: 0 auto 1rem; display: block; }

  /* MENU GRID */
  .meal-section { margin-bottom: 1.5rem; }
  .meal-header { font-size: 11px; font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase; color: var(--text3); margin-bottom: 0.75rem; display: flex; align-items: center; gap: 8px; }
  .meal-header::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .food-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 8px; }
  .food-card {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 12px;
    transition: border-color 0.2s;
  }
  .food-card:hover { border-color: var(--border2); }
  .food-name { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 4px; }
  .food-price { font-size: 12px; color: var(--accent); }
  .food-rating { font-size: 11px; color: var(--text3); margin-top: 4px; }

  /* POLL */
  .poll-item {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 12px 16px;
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 8px; cursor: pointer; transition: all 0.2s;
  }
  .poll-item:hover { border-color: var(--accent); background: var(--accent-bg); }
  .poll-item.voted { border-color: var(--green); background: var(--green-bg); }
  .poll-bar { height: 4px; background: var(--border); border-radius: 2px; margin-top: 8px; overflow: hidden; }
  .poll-bar-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.5s ease; }

  /* DATE BADGE */
  .date-display { display: flex; align-items: center; gap: 12px; margin-bottom: 1.5rem; }
  .date-big { font-family: 'DM Serif Display', serif; font-size: 48px; color: var(--accent); line-height: 1; }
  .date-info { }
  .date-day { font-size: 16px; font-weight: 500; }
  .date-full { font-size: 12px; color: var(--text2); }

  /* BILL PDF BUTTON */
  .bill-row td:last-child { white-space: nowrap; }

  /* INLINE ALERT */
  .alert { padding: 10px 14px; border-radius: var(--radius); font-size: 13px; margin-bottom: 1rem; border: 1px solid; }
  .alert-info { background: var(--blue-bg); color: var(--blue); border-color: rgba(108,168,224,0.2); }
  .alert-success { background: var(--green-bg); color: var(--green); border-color: rgba(92,184,122,0.2); }
  .alert-warning { background: var(--accent-bg); color: var(--accent); border-color: rgba(232,184,75,0.2); }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 3px; }

  /* SECTION TABS */
  .tabs { display: flex; gap: 4px; margin-bottom: 1.25rem; border-bottom: 1px solid var(--border); }
  .tab { padding: 8px 14px; font-size: 13px; cursor: pointer; color: var(--text2); border-bottom: 2px solid transparent; transition: all 0.15s; margin-bottom: -1px; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 500; }

  .tag-row { display: flex; flex-wrap: wrap; gap: 6px; }

  .inline-form { display: flex; gap: 8px; align-items: flex-end; flex-wrap: wrap; margin-bottom: 1rem; }
  .inline-form .form-group { margin-bottom: 0; }
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">🍽 NUST Kitchen</div>
    <div class="login-sub">Mess Management System — SEECS</div>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="login-email" placeholder="you@seecs.nust.edu.pk" autocomplete="email" />
    </div>
    <button class="btn btn-primary btn-full" id="login-btn" onclick="login()">Sign In</button>
    <div id="login-error" style="display:none;margin-top:0.75rem;padding:10px 14px;border-radius:10px;font-size:13px;background:var(--red-bg);color:var(--red);border:1px solid rgba(224,108,108,0.25);"></div>
  </div>
</div>

<!-- TOAST CONTAINER -->
<div id="toast-container"></div>

<!-- MODAL OVERLAY -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal-box">
    <div class="modal-title" id="modal-title">Modal</div>
    <div id="modal-body"></div>
    <div class="modal-actions" id="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

<!-- APP SCREEN -->
<div id="app-screen">
  <!-- SIDEBAR -->
  <nav class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">🍽 NUST Kitchen</div>
      <span class="sidebar-role" id="role-badge">Admin</span>
    </div>
    <div class="sidebar-nav" id="sidebar-nav"></div>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <strong id="sidebar-email-display">user@nust.edu.pk</strong>
        <span id="sidebar-role-display" style="color:var(--text3);">Loading...</span>
      </div>
      <button class="btn btn-secondary btn-sm btn-full" style="margin-top:8px;" onclick="logout()">Sign Out</button>
    </div>
  </nav>

  <!-- MAIN CONTENT -->
  <div class="main">
    <div class="topbar">
      <h1 id="topbar-title">Dashboard</h1>
      <div class="topbar-actions" id="topbar-actions"></div>
    </div>
    <div class="content" id="content-area"></div>
  </div>
</div>

// ─── UTILS ─────────────────────────────────────────────
async function api(path, opts = {}) {
  try {
    const r = await fetch(API + path, {
      headers: { 'Content-Type': 'application/json', ...opts.headers },
      ...opts
    });
    if (!r.ok) {
      const e = await r.json().catch(() => ({}));
      throw new Error(e.detail || `HTTP ${r.status}`);
    }
    const ct = r.headers.get('content-type') || '';
    if (ct.includes('application/pdf')) return r.blob();
    return r.json();
  } catch (e) {
    throw e;
  }
}

function toast(msg, type = 'info') {
  const t = document.createElement('div');
  t.className = `toast toast-${type}`;
  t.textContent = msg;
  document.getElementById('toast-container').appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

function loading() { return `<div class="loading"><div class="spinner"></div> Loading...</div>`; }
function empty(msg = 'No data found') { return `<div class="empty"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><path d="M9 9l6 6M15 9l-6 6"/></svg>${msg}</div>`; }

function fmtDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('en-PK', { year: 'numeric', month: 'short', day: 'numeric' });
}
function fmtCurrency(n) { return n != null ? `Rs. ${parseFloat(n).toLocaleString()}` : '—'; }

function openModal(title, bodyHtml, actions = []) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = bodyHtml;
  const acts = document.getElementById('modal-actions');
  acts.innerHTML = `<button class="btn btn-secondary" onclick="closeModal()">Cancel</button>`;
  actions.forEach(a => {
    const b = document.createElement('button');
    b.className = `btn ${a.cls || 'btn-primary'}`;
    b.textContent = a.label;
    b.onclick = a.action;
    acts.appendChild(b);
  });
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }

// ─── AUTH ────────────────────────────────────────────
async function login() {
  const email = document.getElementById('login-email').value.trim();
  const btn = document.getElementById('login-btn');
  const errBox = document.getElementById('login-error');
  errBox.style.display = 'none';

  if (!email) { showLoginError('Enter your email address.'); return; }

  btn.disabled = true;
  btn.textContent = 'Signing in…';

  try {
    const res = await fetch(`${API}/users/verify?email=${encodeURIComponent(email)}`);
    if (res.status === 403) {
      showLoginError('Access denied — this email is not registered in the system.');
      return;
    }
    if (!res.ok) {
      const body = await res.json().catch(() => ({}));
      showLoginError(body.detail || `Server error (${res.status})`);
      return;
    }
    const data = await res.json();
    currentUser = data.user_details;
    currentRole = currentUser?.Account_Type;
    currentEmail = email;
    if (!currentRole) { showLoginError('Account type not found. Contact admin.'); return; }
    initApp();
  } catch (e) {
    if (e instanceof TypeError && e.message.includes('fetch')) {
      showLoginError('Cannot reach the server. Make sure the backend is running on localhost:8000 and CORS includes this origin.');
    } else {
      showLoginError(e.message || 'Login failed.');
    }
  } finally {
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
}

function showLoginError(msg) {
  const errBox = document.getElementById('login-error');
  errBox.style.display = 'block';
  errBox.textContent = msg;
}

function logout() {
  currentUser = null; currentRole = null; currentEmail = null;
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app-screen').classList.remove('visible');
}

function initApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-screen').classList.add('visible');
  const badge = document.getElementById('role-badge');
  badge.textContent = currentRole;
  badge.className = `sidebar-role role-${currentRole.toLowerCase()}`;
  document.getElementById('sidebar-email-display').textContent = currentEmail;
  document.getElementById('sidebar-role-display').textContent = currentUser?.First_Name
    ? `${currentUser.First_Name} ${currentUser.Last_Name}`
    : currentRole;
  buildNav();
  navigateTo(NAV[currentRole].find(n => n.id)?.id || 'menu-today');
}

function buildNav() {
  const nav = document.getElementById('sidebar-nav');
  const items = NAV[currentRole] || [];
  nav.innerHTML = items.map(item => {
    if (item.section) return `<div class="nav-section">${item.section}</div>`;
    const icon = ICONS[item.icon] || '';
    return `<div class="nav-item" data-panel="${item.id}" onclick="navigateTo('${item.id}')">${icon}${item.label}</div>`;
  }).join('');
}

function navigateTo(panelId) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const active = document.querySelector(`.nav-item[data-panel="${panelId}"]`);
  if (active) active.classList.add('active');
  const cfg = NAV[currentRole].find(n => n.id === panelId);
  document.getElementById('topbar-title').textContent = cfg?.label || panelId;
  document.getElementById('topbar-actions').innerHTML = '';
  const content = document.getElementById('content-area');
  content.innerHTML = loading();
  PANELS[panelId]?.();
}

// ─── ACTIONS ─────────────────────────────────────────

function togglePollItem(el, id) {
  const set = window._selectedPollItems;
  if (set.has(id)) {
    set.delete(id);
    el.classList.remove('voted');
    document.getElementById(`poll-check-${id}`).textContent = '○';
  } else {
    set.add(id);
    el.classList.add('voted');
    document.getElementById(`poll-check-${id}`).textContent = '✓';
  }
}

async function startPoll() {
  const ids = [...window._selectedPollItems];
  const meal_type = document.getElementById('poll-meal-type').value;
  if (!ids.length) { toast('Select at least one food item', 'error'); return; }
  try {
    await api(`/admin/poll/start?email=${currentEmail}`, {
      method: 'POST',
      body: JSON.stringify({ item_ids: ids, meal_type })
    });
    toast('Poll started!', 'success');
    navigateTo('poll-results');
  } catch (e) { toast(e.message, 'error'); }
}

async function castVote(itemId) {
  const uid = currentUser?.UserID;
  if (!uid) { toast('User ID not found', 'error'); return; }
  try {
    await api(`/poll/vote/${itemId}/${uid}?email=${currentEmail}`, { method: 'POST' });
    document.getElementById(`vote-item-${itemId}`)?.classList.add('voted');
    toast('Vote cast!', 'success');
  } catch (e) { toast(e.message, 'error'); }
}

async function downloadBill(billId) {
  try {
    const blob = await api(`/student/bills/download/${billId}?email=${currentEmail}`);
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = `MessBill_${billId}.pdf`; a.click();
    URL.revokeObjectURL(url);
    toast('PDF downloaded', 'success');
  } catch (e) { toast(e.message, 'error'); }
}

async function showAddRecipeModal(itemId) {
  let ingreds = [];
  try { ingreds = await api(`/analytics/ingredients?email=${currentEmail}`); } catch {}
  openModal(`Add Ingredient to Recipe`, `
    <div class="form-group"><label>Ingredient</label>
      <select id="rec-ing-id">
        ${ingreds.map(i=>`<option value="${i.IngredientID}">${i.Name}</option>`).join('')}
      </select>
    </div>
    <div class="form-group"><label>Quantity</label><input id="rec-qty" type="number" placeholder="0.5" step="0.01" /></div>`,
    [{ label: 'Add to Recipe', action: async () => {
      const ingId = document.getElementById('rec-ing-id').value;
      const qty = document.getElementById('rec-qty').value;
      try {
        await api(`/admin/add_recipe/${itemId}/${ingId}/${qty}?email=${currentEmail}`, { method: 'POST' });
        closeModal(); toast('Ingredient added to recipe!', 'success'); navigateTo('recipes');
      } catch (e) { toast(e.message, 'error'); }
    }}]);
}
