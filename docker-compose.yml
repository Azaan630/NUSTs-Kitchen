services:
  db:
    image: mysql:8.0
    platform: linux/amd64
    healthcheck:
      test: [ "CMD", "mysqladmin" ,"ping", "-h", "localhost" ]
      timeout: 5s
      retries: 10
    env_file:
      - .env
    container_name: mess_db
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - ./db:/docker-entrypoint-initdb.d
      - mess_db_data:/var/lib/mysql

  backend:
    build: ./backend
    env_file:
      - .env
    container_name: mess_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=db
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app

  flet_app:
    build: ./frontend_main
    container_name: mess_flet
    ports:
      - "8080:8080"
    command: python main.py
    depends_on:
      - backend
    volumes:
      - ./frontend_main:/app

  admin_dashboard:
    build: ./frontend_admin
    container_name: mess_streamlit
    ports:
      - "8501:8501"
    depends_on:
      - backend
    volumes:
    - ./frontend_admin:/app

volumes:
  mess_db_data: