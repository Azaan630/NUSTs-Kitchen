services:
  db:
    image: mysql:8.0
    healthcheck:
      test: [ "CMD", "mysqladmin" ,"ping", "-h", "localhost" ]
      timeout: 5s
      retries: 10
    env_file:
      - .env
    platform: linux/amd64
    container_name: mess_db
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - ./db:/docker-entrypoint-initdb.d

  backend:
    build: ./backend
    env_file:
      - .env
    platform: linux/amd64
    container_name: mess_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=db
    depends_on:
      db:
        condition: service_healthy

  flet_app:
    build: ./frontend_main
    platform: linux/amd64
    container_name: mess_flet
    ports:
      - "8080:8080"
    depends_on:
      - backend

  admin_dashboard:
    build: ./frontend_admin
    platform: linux/amd64
    container_name: mess_streamlit
    ports:
      - "8501:8501"
    depends_on:
      - backend